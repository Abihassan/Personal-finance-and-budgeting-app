version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abi123        # ← matches DATABASE_URL in .env
      POSTGRES_DB: sequro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # This overrides the DATABASE_URL from .env so the API talks to the
      # docker-compose Postgres container (hostname "db") instead of localhost
      DATABASE_URL: postgresql+asyncpg://postgres:abi123@db:5432/sequro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
